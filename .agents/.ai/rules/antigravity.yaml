version: "1.0"
agent:
  id: "antigravity"
  name: "Antigravity"
  ui:
    icon: "robot"
    color: "#2E88FF"
    description: "AI-powered coding assistant by Google Deepmind"

# Agent paths: workspace (detection/sync) and home (global config)
paths:
  - path: ".agent/"
    scope: "workspace"
    type: "directory"
    purpose: "marker"
  - path: ".gemini/antigravity"
    scope: "home"
    type: "directory"
    purpose: "config"

# ┌──────────────────────────────────────────────────────────────┐
# │ Capacidades soportadas                                       │
# │                                                              │
# │  rules       ✅  rules/ (.md) → reglas persistentes          │
# │  skills      ✅  skills/ → capacidades bajo demanda          │
# │  workflows   ✅  workflows/ → slash commands                 │
# │  agents      ✅  agents/ → sub-agents                        │
# │  mcp         ✅  mcp/mcp.json ↔ Listado único                │
# └──────────────────────────────────────────────────────────────┘

# Bidirectional Flow Definition
mapping:
  # ── INBOUND: From Agent to Universal .agents Bridge ──
  inbound:
    # [rules] ✅ Instrucciones persistentes (.md → .md)
    - from: "rules/"
      to: "rules/"
      format: "directory"

    # [skills] ✅ Capacidades especializadas
    - from: "skills/"
      to: "skills/"
      format: "directory"

    # [workflows] ✅ Flujos de trabajo
    - from: "workflows/"
      to: "workflows/"
      format: "directory"

    # [agents] ✅ Definiciones de sub-agentes personalizados
    - from: "agents/"
      to: "agents/"
      format: "directory"

    # [mcp] ✅ Listado único de MCP Servers
    - from: "mcp/mcp.json"
      to: "mcp/mcp.json"
      format: "json-transform"
      extract: "$.mcpServers"

  # ── OUTBOUND: From Universal .agents Bridge to Agent ──
  outbound:
    # [rules] ✅ (.md → .md)
    - from: "rules/"
      to: "rules/"
      format: "directory"

    # [skills] ✅
    - from: "skills/"
      to: "skills/"
      format: "directory"

    # [workflows] ✅
    - from: "workflows/"
      to: "workflows/"
      format: "directory"

    # [agents] ✅
    - from: "agents/"
      to: "agents/"
      format: "directory"

    # [mcp] ✅
    - from: "mcp/mcp.json"
      to: "mcp/mcp.json"
      format: "json-transform"
      extract: "$.mcpServers"

# Universal storage folder target
target_standard: ".agents/"
