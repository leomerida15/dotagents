version: "1.0"
agent:
  id: "e2e-agent"
  name: "E2E Agent"

paths:
  - path: ".e2e-agent/"
    scope: "workspace"
    type: "directory"
    purpose: "marker"

mapping:
  inbound:
    - from: "rules/"
      to: "rules/"
      format: "directory"
      source_ext: ".mdc"
      target_ext: ".md"
  outbound:
    - from: "rules/"
      to: "rules/"
      format: "directory"
      source_ext: ".md"
      target_ext: ".mdc"

target_standard: ".agents/"
