version: "1.0"
agent:
  id: "cursor"
  name: "Cursor"
  ui:
    icon: "terminal"
    color: "#00D4AA"
    description: "AI-powered code editor based on VS Code"

paths:
  - path: ".cursor/"
    scope: "workspace"
    type: "directory"
    purpose: "marker"
  - path: ".cursor"
    scope: "home"
    type: "directory"
    purpose: "config"

# ┌──────────────────────────────────────────────────────────────┐
# │ Capacidades soportadas                                       │
# │                                                              │
# │  rules       ✅  .cursor/rules/ (.mdc) → reglas persistentes│
# │  skills      ✅  .cursor/skills/ → capacidades bajo demanda │
# │  workflows   ✅  .cursor/commands/ → slash commands          │
# │  agents      ✅  .cursor/agents/ → sub-agents               │
# │  mcp         ✅  .cursor/mcp.json → config externa           │
# │  agent-file  ❌  No usa archivo único en raíz                │
# │  docs        ❌  Sin carpeta docs propia                      │
# └──────────────────────────────────────────────────────────────┘

mapping:
  # ── INBOUND: Cursor (.cursor/) → Puente Universal (.agents/) ──

  inbound:
    # [rules] ✅ Instrucciones persistentes (.mdc → .md)
    - from: "rules/"
      to: "rules/"
      format: "directory"
      source_ext: ".mdc"
      target_ext: ".md"

    # [skills] ✅ Capacidades especializadas (carpetas con SKILL.md)
    - from: "skills/"
      to: "skills/"
      format: "directory"

    # [workflows] ✅ Slash commands → workflows
    - from: "commands/"
      to: "workflows/"
      format: "directory"

    # [agents] ✅ Definiciones de sub-agentes personalizados
    - from: "agents/"
      to: "agents/"
      format: "directory"

    # [mcp] ✅ Configuración de servidores MCP (no genera reglas)
    - from: "mcp.json"
      to: "mcp/cursor-mcp.json"
      format: "json-transform"
      extract: "$.mcpServers"

  # ── OUTBOUND: Puente Universal (.agents/) → Cursor (.cursor/) ──

  outbound:
    # [rules] ✅ (.md → .mdc)
    - from: "rules/"
      to: "rules/"
      format: "directory"
      source_ext: ".md"
      target_ext: ".mdc"

    # [skills] ✅
    - from: "skills/"
      to: "skills/"
      format: "directory"

    # [workflows] ✅ workflows → slash commands
    - from: "workflows/"
      to: "commands/"
      format: "directory"

    # [agents] ✅
    - from: "agents/"
      to: "agents/"
      format: "directory"

    # [mcp] ✅
    - from: "mcp/cursor-mcp.json"
      to: "mcp.json"
      format: "json-transform"
      extract: "$.mcpServers"

target_standard: ".agents/"
